<!DOCTYPE html>
<!-- =========================================================
     template-product.html  ―― 作物ページの【空テンプレ】
     👤 担当：作物担当（　　　　　　　　）さん

     【使い方】
     1. このファイルをコピーして、名前を作物名にする
        例：piman.html / strawberry.html / negi.html
     2. ✏️ がついている所を、自分の言葉で書きかえる
     3. index.html のカードのリンク先を、作ったページ名に変える
     ※ ファイル名はローマ字・小文字・記号なしがおすすめ（例 cucumber.html）
     ========================================================= -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✏️ タブに出る名前。「作物名 ｜ ○○農業高校 直売所」の形で -->
  <title>作物名 ｜ ○○農業高校 直売所</title>

  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <header class="site-header">
    <div class="farm-name">🌱 ○○農業高校 直売所</div>
    <div class="farm-sub">わたしたちが育てた作物を紹介します</div>
  </header>

  <a class="back-link" href="index.html">← 一覧にもどる</a>

  <article class="product">

    <!-- ✏️ 写真：images/ フォルダに自分の写真を入れて、ファイル名をここに書く -->
    <img class="product-photo" src="images/photo.jpg" alt="作物の写真">

    <div class="product-body">

      <!-- ✏️ キャッチコピー（思わず食べたくなる短い一言） -->
      <p class="catch">ここにキャッチコピーを書く</p>

      <!-- ✏️ 作物の名前 -->
      <h1>作物の名前</h1>

      <!-- ✏️ どんな作物か（品種・育て方の工夫など） -->
      <p>
        ここに、この作物の説明を書きます。
        どんな品種か、どんなふうに育てたか、自分の言葉で。
      </p>

      <!-- ▼ 考えるポイント①：だれに買ってほしい？ -->
      <h2>だれにおすすめ？</h2>
      <p>
        ✏️ どんな人に食べてほしいか、その理由も書こう。
      </p>

      <!-- ▼ 考えるポイント②：どう食べるとおいしい？ -->
      <h2>おすすめの食べ方</h2>
      <p>
        ✏️ 一番おいしい食べ方を紹介しよう。
      </p>

      <!-- ▼ 考えるポイント③：育てた人の気持ち -->
      <h2>育てた人から一言</h2>
      <p>
        ✏️ 大変だったこと・うれしかったことなど、本音をひとこと。
      </p>

    </div>
  </article>

  <footer class="site-footer">
    © 2026 ○○農業高校 ／ 農業情報活用の授業で作りました
  </footer>

</body>
</html>
