<!DOCTYPE html>
<!-- =========================================================
     index.html  ―― サイトの入口（トップページ）
     👤 担当：構成リーダー（ 河野裕真 ）さん

     このページは「お店の入口」です。
     ・上に大きな写真（ヒーロー）
     ・下に作物カードを並べる
     カードをクリックすると、各作物のページに移動します。
     新しい作物を追加するときは、下の <a class="card"> ... </a> を
     1つコピーして、リンク先・写真・名前を変えればOK。
     ========================================================= -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ブラウザのタブに出る名前 -->
  <title>愛媛県立西条農業高等学校 直売所サイト</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- フォント -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ▼ 上の帯 -->
  <header class="site-header">
    <div class="farm-name">🌱 愛媛県立西条農業高等学校 直売所</div>
    <div class="farm-sub">わたしたちが育てた作物を紹介します</div>
  </header>

  <!-- ▼ ヒーロー -->
  <section class="hero">
    <img src="images/hero.jpg" alt="学校農場の写真">

    <div class="hero-text">
      <h1>畑から、まっすぐ。</h1>
      <p>3年S組のみんなで育てました</p>
    </div>
  </section>

  <!-- ▼ 作物一覧 -->
  <main class="container">

    <h2 class="section-title">今日のおすすめ</h2>
    <p class="lead">気になる作物をタップしてみてください</p>

    <div class="card-grid">

      <!-- ===== トマト1 ===== -->
      <a class="card" href="tomato1.html">

        <img src="images/tomato.jpg" alt="完熟トマト">

        <div class="card-body">
          <span class="tag">完熟</span>

          <h3>あま～い完熟トマト</h3>

          <p>
            朝採れ新鮮！
            甘みたっぷりです。
          </p>
        </div>
      </a>

      <!-- ===== トマト2 ===== -->
      <a class="card" href="tomato2.html">

        <img src="images/tomato.jpg" alt="ミニトマト">

        <div class="card-body">
          <span class="tag">人気</span>

          <h3>ミニトマト</h3>

          <p>
            お弁当にぴったり！
            小さくて食べやすいです。
          </p>
        </div>
      </a>

      <!-- ===== トマト3 ===== -->
      <a class="card" href="tomato3.html">

        <img src="images/tomato.jpg" alt="フルーツトマト">

        <div class="card-body">
          <span class="tag">おすすめ</span>

          <h3>フルーツトマト</h3>

          <p>
            濃厚な甘さ！
            デザート感覚で食べられます。
          </p>
        </div>
      </a>

    </div>
  </main>

  <!-- ▼ フッター -->
  <footer class="site-footer">
    © 2026 愛媛県立西条農業高等学校 ／ 農業情報活用の授業で作りました
  </footer>

</body>
</html>
